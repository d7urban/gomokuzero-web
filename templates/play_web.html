<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GomokuZero</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#2c2c2c;color:#e0e0e0;overflow-x:hidden}

.app{display:flex;max-width:1200px;margin:0 auto;padding:12px;gap:14px;min-height:100vh}
.board-wrap{flex:0 0 auto;display:flex;align-items:flex-start;justify-content:center}
#board{cursor:pointer;border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,0.5)}

.panel{flex:1;min-width:270px;max-width:340px;display:flex;flex-direction:column;gap:10px}
.card{background:#383838;border-radius:8px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.card h3{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #444}

.form-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.form-row label{min-width:65px;font-size:12px;font-weight:500;color:#bbb}
.form-row select,.form-row input[type=text],.form-row input[type=number]{
  flex:1;padding:5px 7px;border:1px solid #555;border-radius:4px;font-size:12px;
  background:#2c2c2c;color:#e0e0e0}
.form-row select:focus,.form-row input:focus{outline:none;border-color:#7a9e7a}

.chk-label{display:flex;align-items:center;gap:5px;font-size:12px;color:#bbb;cursor:pointer}
.chk-label input{accent-color:#5a8a5a}

.btn{padding:6px 12px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
.btn-primary{background:#4a7c59;color:#fff}
.btn-primary:hover{background:#5a9a6a}
.btn-secondary{background:#555;color:#ddd}
.btn-secondary:hover{background:#666}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-row{display:flex;gap:5px;flex-wrap:wrap}

.status-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.status-row .lbl{color:#888}
.status-row .val{font-weight:500;text-align:right;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.msg{font-size:12px;padding:8px 10px;background:#333;border-radius:4px;min-height:32px;line-height:1.4;color:#ccc}

.title-bar{text-align:center;padding:6px 0 2px;font-size:15px;font-weight:600;color:#bbb;letter-spacing:1px}

@media(max-width:800px){
  .app{flex-direction:column;align-items:center}
  .panel{max-width:100%;min-width:0;width:100%}
}
</style>
</head>
<body>
<div class="title-bar">GomokuZero</div>
<div class="app">
  <div class="board-wrap">
    <canvas id="board" width="600" height="600"></canvas>
  </div>
  <div class="panel">
    <!-- Setup -->
    <div class="card">
      <h3>Setup</h3>
      <div class="form-row">
        <label>Mode</label>
        <select id="game-mode">
          <option value="ai">Human vs AI</option>
          <option value="human">Human vs Human</option>
        </select>
      </div>
      <div class="form-row" id="side-row">
        <label>Side</label>
        <select id="side-select">
          <option value="human_first">Human first (Black)</option>
          <option value="ai_first">AI first (Black)</option>
        </select>
      </div>
      <div class="form-row" id="diff-row">
        <label>Difficulty</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
          <option value="custom">Custom</option>
        </select>
        <input type="number" id="custom-sims" value="500" min="1" max="5000"
               style="display:none;width:70px">
      </div>
      <div class="form-row">
        <label></label>
        <label class="chk-label">
          <input type="checkbox" id="analysis-chk"> Analysis heatmap
        </label>
      </div>
    </div>

    <!-- Actions -->
    <div class="card">
      <h3>Actions</h3>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-new" title="Start a new game">New Game</button>
        <button class="btn btn-secondary" id="btn-undo" title="Undo last move(s)">Undo</button>
      </div>
      <div class="btn-row" style="margin-top:5px">
        <button class="btn btn-secondary" id="btn-save" title="Download game as JSON">Save</button>
        <button class="btn btn-secondary" id="btn-load-game" title="Load game from JSON file">Load Game</button>
        <button class="btn btn-secondary" id="btn-mode-toggle" title="Switch HvA / HvH">Switch Mode</button>
      </div>
    </div>

    <!-- Status -->
    <div class="card">
      <h3>Status</h3>
      <div class="status-row"><span class="lbl">Mode</span><span class="val" id="st-mode">-</span></div>
      <div class="status-row"><span class="lbl">Difficulty</span><span class="val" id="st-diff">-</span></div>
      <div class="status-row"><span class="lbl">Turn</span><span class="val" id="st-turn">-</span></div>
      <div class="status-row"><span class="lbl">Moves</span><span class="val" id="st-moves">0</span></div>
      <div class="status-row"><span class="lbl">Analysis</span><span class="val" id="st-analysis">Off</span></div>
      <div class="status-row"><span class="lbl">Sims/sec</span><span class="val" id="st-sps">-</span></div>
    </div>

    <!-- Message -->
    <div class="card">
      <h3>Message</h3>
      <div class="msg" id="st-message">Your turn (Black).</div>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept=".json" style="display:none">

<script>
// ---------------------------------------------------------------------------
// Constants & state
// ---------------------------------------------------------------------------
const N = 15;
const P1 = 1, P2 = -1, EMPTY = 0;
const DIFF_SIMS = {easy: 250, medium: 500, hard: 2000};

let board = [];
let moveHistory = [];   // [[r,c], ...]
let currentPlayer = P1;
let gameOver = false;
let winner = 0;         // 0=none/draw, P1 or P2

let humanPlayer = P1;
let humanOnlyMode = false;
let difficultyLabel = 'medium';
let difficultySims = 500;
let analysisEnabled = false;
let analysisData = null;
let aiThinking = false;
let busy = false;
let message = 'Your turn (Black).';
let hover = null;

let analysisTimer = null;
let analysisGen = 0;    // invalidate stale analysis responses

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const $ = id => document.getElementById(id);

// ---------------------------------------------------------------------------
// Game logic (client-side)
// ---------------------------------------------------------------------------
function initBoard() {
  board = Array.from({length: N}, () => Array(N).fill(EMPTY));
  moveHistory = [];
  currentPlayer = P1;
  gameOver = false;
  winner = 0;
  analysisData = null;
}

function makeMove(r, c) {
  if (gameOver || board[r][c] !== EMPTY) return false;
  const player = currentPlayer;
  board[r][c] = player;
  moveHistory.push([r, c]);
  if (checkWin(r, c, player)) {
    gameOver = true;
    winner = player;
    return true;
  }
  if (moveHistory.length >= N * N) {
    gameOver = true;
    winner = 0;
    return true;
  }
  currentPlayer = -currentPlayer;
  return true;
}

function replayMoves(moves) {
  initBoard();
  for (const [r, c] of moves) makeMove(r, c);
}

function undoN(n) {
  if (moveHistory.length < n) return false;
  replayMoves(moveHistory.slice(0, -n));
  return true;
}

function checkWin(r, c, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let count = 1;
    for (let d = 1; d < 5; d++) {
      const nr = r+dr*d, nc = c+dc*d;
      if (nr<0||nr>=N||nc<0||nc>=N||board[nr][nc]!==player) break;
      count++;
    }
    for (let d = 1; d < 5; d++) {
      const nr = r-dr*d, nc = c-dc*d;
      if (nr<0||nr>=N||nc<0||nc>=N||board[nr][nc]!==player) break;
      count++;
    }
    if (count >= 5) return true;
  }
  return false;
}

function findWinningCells() {
  if (!gameOver || winner === 0 || moveHistory.length === 0) return [];
  const [r, c] = moveHistory[moveHistory.length - 1];
  const player = board[r][c];
  if (player === EMPTY) return [];
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let cells = [[r, c]];
    for (let d = 1; d < N; d++) {
      const nr = r+dr*d, nc = c+dc*d;
      if (nr<0||nr>=N||nc<0||nc>=N||board[nr][nc]!==player) break;
      cells.push([nr, nc]);
    }
    for (let d = 1; d < N; d++) {
      const nr = r-dr*d, nc = c-dc*d;
      if (nr<0||nr>=N||nc<0||nc>=N||board[nr][nc]!==player) break;
      cells.unshift([nr, nc]);
    }
    if (cells.length >= 5) return cells;
  }
  return [];
}

function isHumanTurn() {
  return humanOnlyMode || currentPlayer === humanPlayer;
}

// ---------------------------------------------------------------------------
// API helper
// ---------------------------------------------------------------------------
async function api(url, body) {
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  return r.json();
}

// ---------------------------------------------------------------------------
// AI move
// ---------------------------------------------------------------------------
async function requestAiMove() {
  if (gameOver || humanOnlyMode) return;
  aiThinking = true;
  message = 'AI thinking...';
  updateUI(); draw();

  try {
    const resp = await api('/api/ai_move', {
      move_history: moveHistory,
      sims: difficultySims,
    });
    if (resp.error) {
      message = 'AI error: ' + resp.error;
      aiThinking = false;
      updateUI(); draw();
      return;
    }
    const {row, col} = resp;
    const ev = resp.eval;
    makeMove(row, col);
    aiThinking = false;
    if (gameOver) {
      const tag = winner !== 0 ? 'AI wins!' : 'Draw!';
      message = `${tag} AI played (${row},${col}) eval ${ev >= 0 ? '+' : ''}${ev.toFixed(2)}`;
    } else {
      message = `AI played (${row},${col}) eval ${ev >= 0 ? '+' : ''}${ev.toFixed(2)}. Your turn.`;
    }
  } catch(e) {
    message = 'AI error: ' + e;
    aiThinking = false;
  }
  updateUI(); draw();
  scheduleAnalysis();
}

// ---------------------------------------------------------------------------
// Analysis
// ---------------------------------------------------------------------------
function scheduleAnalysis() {
  stopAnalysis();
  if (!analysisEnabled || gameOver) return;
  if (!humanOnlyMode && currentPlayer !== humanPlayer) return;
  analysisData = null;
  analysisGen++;
  doAnalysis(analysisGen);
}

async function doAnalysis(gen) {
  if (gen !== analysisGen) return;
  if (!analysisEnabled || gameOver) return;
  const t0 = performance.now();
  try {
    const resp = await api('/api/analyze', {
      move_history: moveHistory,
      sims: 500,
    });
    if (gen !== analysisGen) return;
    if (resp.error) return;
    const elapsed = (performance.now() - t0) / 1000;
    resp.sims_per_sec = elapsed > 0 ? Math.round(resp.sims_done / elapsed) : 0;
    analysisData = resp;
    updateUI(); draw();
  } catch(e) { /* ignore */ }
  if (gen === analysisGen && analysisEnabled && !gameOver) {
    analysisTimer = setTimeout(() => doAnalysis(gen), 2000);
  }
}

function stopAnalysis() {
  analysisGen++;
  if (analysisTimer) { clearTimeout(analysisTimer); analysisTimer = null; }
}

// ---------------------------------------------------------------------------
// Canvas sizing
// ---------------------------------------------------------------------------
function resizeCanvas() {
  const pw = window.innerWidth > 800 ? 370 : 0;
  const maxW = window.innerWidth - pw - 32;
  const maxH = window.innerHeight - 60;
  const sz = Math.max(320, Math.min(maxW, maxH, 640));
  canvas.width = canvas.height = sz;
  draw();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ---------------------------------------------------------------------------
// Canvas interaction
// ---------------------------------------------------------------------------
function canvasToBoard(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * sx;
  const my = (e.clientY - rect.top) * sy;
  const margin = canvas.width * 0.05;
  const cell = (canvas.width - 2 * margin) / (N - 1);
  const col = Math.round((mx - margin) / cell);
  const row = Math.round((my - margin) / cell);
  if (row >= 0 && row < N && col >= 0 && col < N) return [row, col];
  return null;
}

canvas.onmousemove = e => {
  const p = canvasToBoard(e);
  if (p && board[p[0]][p[1]] === EMPTY) hover = p;
  else hover = null;
  draw();
};
canvas.onmouseleave = () => { hover = null; draw(); };

canvas.onclick = async e => {
  if (busy || gameOver || aiThinking) return;
  const p = canvasToBoard(e);
  if (!p) return;
  const [r, c] = p;
  if (board[r][c] !== EMPTY) return;
  if (!humanOnlyMode && currentPlayer !== humanPlayer) return;

  if (!makeMove(r, c)) return;
  stopAnalysis();
  analysisData = null;

  if (gameOver) {
    if (winner !== 0) {
      if (humanOnlyMode) {
        message = (winner === P1 ? 'Black' : 'White') + ' wins!';
      } else {
        message = 'You win!';
      }
    } else {
      message = 'Draw!';
    }
    updateUI(); draw();
    return;
  }

  if (humanOnlyMode) {
    message = (currentPlayer === P1 ? 'Black' : 'White') + ' to play.';
    updateUI(); draw();
    scheduleAnalysis();
    return;
  }

  // AI's turn
  message = `You played (${r},${c}). AI thinking...`;
  updateUI(); draw();
  busy = true;
  try { await requestAiMove(); }
  finally { busy = false; }
};

// ---------------------------------------------------------------------------
// Controls wiring
// ---------------------------------------------------------------------------
$('game-mode').onchange = e => {
  const ai = e.target.value === 'ai';
  $('side-row').style.display = ai ? 'flex' : 'none';
  $('diff-row').style.display = ai ? 'flex' : 'none';
};

$('difficulty').onchange = e => {
  const c = e.target.value === 'custom';
  $('custom-sims').style.display = c ? 'inline' : 'none';
  if (!c) {
    difficultyLabel = e.target.value;
    difficultySims = DIFF_SIMS[difficultyLabel] || 500;
    message = `Difficulty: ${difficultyLabel} (${difficultySims} sims).`;
    updateUI();
  }
};

$('custom-sims').onchange = e => {
  const v = Math.max(1, Math.min(5000, +e.target.value));
  e.target.value = v;
  difficultyLabel = 'Custom';
  difficultySims = v;
  message = `Difficulty: Custom (${v} sims).`;
  updateUI();
};

$('analysis-chk').onchange = e => {
  analysisEnabled = e.target.checked;
  if (analysisEnabled) scheduleAnalysis();
  else { stopAnalysis(); analysisData = null; }
  updateUI(); draw();
};

$('btn-new').onclick = async () => {
  if (busy) return;
  stopAnalysis();
  const mode = $('game-mode').value;
  humanOnlyMode = mode === 'human';
  initBoard();

  if (humanOnlyMode) {
    humanPlayer = P1;
    message = 'New game (Human vs Human). Black plays first.';
    updateUI(); draw();
    scheduleAnalysis();
  } else {
    const side = $('side-select').value;
    humanPlayer = side === 'ai_first' ? P2 : P1;
    if (currentPlayer !== humanPlayer) {
      message = 'New game. AI goes first...';
      updateUI(); draw();
      busy = true;
      try { await requestAiMove(); }
      finally { busy = false; }
    } else {
      message = 'New game. Your turn (Black).';
      updateUI(); draw();
      scheduleAnalysis();
    }
  }
};

$('btn-undo').onclick = async () => {
  if (busy || aiThinking) return;
  stopAnalysis();
  analysisData = null;
  if (humanOnlyMode) {
    if (undoN(1)) message = 'Move undone.';
    else message = 'Nothing to undo.';
  } else {
    // Undo both AI + human move (or just one if it's AI's turn somehow)
    const n = isHumanTurn() ? 2 : 1;
    if (undoN(n)) message = 'Move undone.';
    else message = 'Nothing to undo.';
  }
  updateUI(); draw();
  scheduleAnalysis();
};

$('btn-mode-toggle').onclick = async () => {
  if (busy || aiThinking) return;
  stopAnalysis();
  analysisData = null;
  if (humanOnlyMode) {
    humanOnlyMode = false;
    humanPlayer = -currentPlayer;
    if (!gameOver) {
      message = 'Switched to Human vs AI. AI thinking...';
      updateUI(); draw();
      busy = true;
      try { await requestAiMove(); }
      finally { busy = false; }
    } else {
      message = 'Switched to Human vs AI.';
      updateUI(); draw();
    }
  } else {
    humanOnlyMode = true;
    message = 'Switched to Human vs Human.';
    updateUI(); draw();
    scheduleAnalysis();
  }
};

$('btn-save').onclick = () => {
  const data = {
    format: 'gomokuzero-web-save',
    version: 2,
    board_size: N,
    saved_at: Date.now() / 1000,
    human_only_mode: humanOnlyMode,
    human_player: humanPlayer,
    move_history: moveHistory,
    difficulty_label: difficultyLabel,
    difficulty_sims: difficultySims,
    analysis_enabled: analysisEnabled,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gomoku_save.json';
  a.click();
  URL.revokeObjectURL(a.href);
};

$('btn-load-game').onclick = () => $('file-input').click();

$('file-input').onchange = async e => {
  const f = e.target.files[0];
  if (!f) return;
  try {
    const data = JSON.parse(await f.text());
    if (!data.move_history) throw new Error('No move_history');
    const bs = data.board_size || N;
    if (bs !== N) throw new Error(`Board size ${bs} != ${N}`);

    stopAnalysis();
    // Replay: accept both [r,c] and [r,c,player] formats
    const moves = data.move_history.map(m => [m[0], m[1]]);
    replayMoves(moves);

    humanOnlyMode = !!data.human_only_mode;
    humanPlayer = data.human_player || P1;
    if (data.difficulty_label) difficultyLabel = data.difficulty_label;
    if (data.difficulty_sims) difficultySims = data.difficulty_sims;
    analysisEnabled = !!data.analysis_enabled;
    $('analysis-chk').checked = analysisEnabled;

    message = 'Game loaded.';
    updateUI(); draw();

    // If it's AI's turn, request a move
    if (!humanOnlyMode && !gameOver && currentPlayer !== humanPlayer) {
      busy = true;
      try { await requestAiMove(); }
      finally { busy = false; }
    } else {
      scheduleAnalysis();
    }
  } catch(ex) { alert('Invalid file: ' + ex); }
  e.target.value = '';
};

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'n') $('btn-new').click();
  if (e.key === 'u' || e.key === 'z') $('btn-undo').click();
  if (e.key === 'a') { $('analysis-chk').checked = !$('analysis-chk').checked; $('analysis-chk').onchange({target:$('analysis-chk')}); }
});

// ---------------------------------------------------------------------------
// Board drawing
// ---------------------------------------------------------------------------
function draw() {
  const sz = canvas.width;
  const margin = sz * 0.05;
  const cell = (sz - 2 * margin) / (N - 1);
  const stoneR = cell * 0.44;

  ctx.clearRect(0, 0, sz, sz);

  // Wood background
  const bg = ctx.createLinearGradient(0, 0, sz, sz);
  bg.addColorStop(0, '#D4A843');
  bg.addColorStop(0.5, '#C89B3C');
  bg.addColorStop(1, '#BA8D30');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, sz, sz);

  // Subtle grain
  ctx.strokeStyle = 'rgba(0,0,0,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i < sz; i += 2) {
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(sz, i); ctx.stroke();
  }

  // Grid
  ctx.strokeStyle = '#3a3020';
  ctx.lineWidth = 1;
  for (let i = 0; i < N; i++) {
    const p = margin + i * cell;
    ctx.beginPath(); ctx.moveTo(margin, p); ctx.lineTo(margin + (N-1)*cell, p); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p, margin); ctx.lineTo(p, margin + (N-1)*cell); ctx.stroke();
  }

  // Star points
  const stars = [3, 7, 11];
  ctx.fillStyle = '#3a3020';
  for (const sr of stars) for (const sc of stars) {
    ctx.beginPath();
    ctx.arc(margin + sc * cell, margin + sr * cell, Math.max(2.5, cell * 0.09), 0, Math.PI * 2);
    ctx.fill();
  }

  // Analysis overlay
  if (analysisData && analysisData.policy) drawAnalysis(margin, cell, stoneR);

  // Stones
  const winCells = findWinningCells();
  const winSet = new Set(winCells.map(c => c[0]*N+c[1]));
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    const v = board[r][c];
    if (v === EMPTY) continue;
    const x = margin + c * cell, y = margin + r * cell;
    drawStone(x, y, stoneR, v === P1);
    if (winSet.has(r*N+c)) {
      ctx.save();
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(x, y, stoneR + 2, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }
  }

  // Last move marker
  if (moveHistory.length > 0) {
    const [lr, lc] = moveHistory[moveHistory.length - 1];
    const x = margin + lc * cell, y = margin + lr * cell;
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.arc(x, y, stoneR * 0.22, 0, Math.PI * 2);
    ctx.fill();
  }

  // Hover preview
  if (hover && !gameOver && isHumanTurn() && !aiThinking) {
    const [hr, hc] = hover;
    if (board[hr][hc] === EMPTY) {
      ctx.globalAlpha = 0.35;
      drawStone(margin + hc * cell, margin + hr * cell, stoneR, currentPlayer === P1);
      ctx.globalAlpha = 1;
    }
  }

  // Labels
  ctx.fillStyle = '#3a3020';
  const fontSize = Math.max(9, cell * 0.33);
  ctx.font = `500 ${fontSize}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < N; i++) {
    ctx.fillText(String.fromCharCode(65 + i), margin + i * cell, margin - fontSize * 1.1);
    ctx.fillText(String(i + 1), margin - fontSize * 1.3, margin + i * cell);
  }
}

function drawStone(x, y, r, black) {
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = r * 0.3;
  ctx.shadowOffsetX = r * 0.08;
  ctx.shadowOffsetY = r * 0.12;
  const g = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.05, x + r*0.1, y + r*0.1, r);
  if (black) {
    g.addColorStop(0, '#5a5a5a');
    g.addColorStop(0.6, '#222');
    g.addColorStop(1, '#0a0a0a');
  } else {
    g.addColorStop(0, '#ffffff');
    g.addColorStop(0.7, '#e8e8e8');
    g.addColorStop(1, '#bbb');
  }
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawAnalysis(margin, cell, stoneR) {
  const pol = analysisData.policy;
  const qv = analysisData.q_vals;
  let maxV = 0;
  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (board[r][c] === EMPTY) maxV = Math.max(maxV, pol[r*N+c]);
  }
  if (maxV <= 0) return;

  for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
    if (board[r][c] !== EMPTY) continue;
    const idx = r * N + c;
    const vis = pol[idx];
    if (vis < 1) continue;
    const x = margin + c * cell, y = margin + r * cell;
    const t = Math.sqrt(vis / maxV);
    const rad = stoneR * 0.2 + stoneR * 0.65 * t;

    const q = qv[idx];
    let fill;
    if (q === null || q === undefined) {
      fill = `rgba(100,130,220,${(0.25 + 0.35*t).toFixed(2)})`;
    } else {
      const wp = (q + 1) / 2;
      const cr = Math.round(220 * (1 - wp) + 40);
      const cg = Math.round(200 * wp + 40);
      fill = `rgba(${cr},${cg},50,${(0.25 + 0.45*t).toFixed(2)})`;
    }
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.arc(x, y, rad, 0, Math.PI * 2);
    ctx.fill();

    if (vis >= maxV * 0.12 && q !== null && q !== undefined) {
      const wp = Math.round((q + 1) / 2 * 100);
      ctx.fillStyle = '#000';
      ctx.font = `bold ${Math.max(8, cell*0.28)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(wp + '%', x, y);
    }
  }
}

// ---------------------------------------------------------------------------
// UI update (status panel)
// ---------------------------------------------------------------------------
function updateUI() {
  $('st-mode').textContent = humanOnlyMode ? 'Human vs Human' : 'Human vs AI';
  $('st-diff').textContent = humanOnlyMode ? 'N/A' : `${difficultyLabel} (${difficultySims} sims)`;
  $('st-moves').textContent = moveHistory.length;
  $('st-message').textContent = message;

  let turn = 'Game over';
  if (!gameOver) {
    const side = currentPlayer === P1 ? 'Black' : 'White';
    if (humanOnlyMode) turn = `Human (${side})`;
    else if (aiThinking) turn = `AI thinking (${side})...`;
    else turn = isHumanTurn() ? `Your turn (${side})` : `AI (${side})`;
  }
  $('st-turn').textContent = turn;

  if (!analysisEnabled) {
    $('st-analysis').textContent = 'Off';
    $('st-sps').textContent = '-';
  } else if (analysisData) {
    const rq = analysisData.root_q;
    $('st-analysis').textContent = `${analysisData.sims_done} sims, root ${rq >= 0 ? '+' : ''}${rq.toFixed(2)}`;
    $('st-sps').textContent = analysisData.sims_per_sec > 0 ? analysisData.sims_per_sec : '-';
  } else {
    $('st-analysis').textContent = 'Starting...';
    $('st-sps').textContent = '-';
  }
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
initBoard();
updateUI();
draw();
</script>
